services:
  - type: web
    name: wulira
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ENV
        value: production
      - key: CORS_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: INFO
      - key: MAX_JOBS_IN_MEMORY
        value: "50"
      - key: GENIUS_API_TOKEN
        sync: false
    healthCheckPath: /api/health
    plan: starter
