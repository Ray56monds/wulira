<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wulira — Hear every word, in every language</title>
<link rel="stylesheet" href="/static/css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>

<!-- Three.js background -->
<canvas id="three-bg"></canvas>

<div class="app">

<header>
  <h1>🎵 Wulira</h1>
  <p class="tagline">Hear every word, in every language · Made in Uganda 🇺🇬</p>
</header>

<nav>
  <button class="active" data-panel="p-submit">🎤 Extract</button>
  <button data-panel="p-jobs">📋 Jobs</button>
  <button data-panel="p-viewer">🎵 Lyrics</button>
  <button data-panel="p-translate">🌍 Translate</button>
  <button data-panel="p-stats">📊 Stats</button>
</nav>

<!-- ═══ SUBMIT ═══ -->
<div id="p-submit" class="panel active">
  <div class="card">
    <h3>Extract Lyrics</h3>
    <div class="row">
      <input type="text" id="url-input" placeholder="Paste YouTube URL here...">
    </div>
    <div class="row">
      <select id="model-select">
        <option value="base">base (fast)</option>
        <option value="tiny">tiny (fastest)</option>
        <option value="small">small (better)</option>
        <option value="medium">medium (Luganda/Swahili)</option>
        <option value="large">large (best accuracy)</option>
      </select>
      <select id="lang-select">
        <option value="">Auto-detect</option>
        <option value="lg">Luganda</option>
        <option value="sw">Kiswahili</option>
        <option value="en">English</option>
        <option value="fr">French</option>
        <option value="ar">Arabic</option>
        <option value="es">Spanish</option>
        <option value="de">German</option>
        <option value="yo">Yoruba</option>
        <option value="ha">Hausa</option>
        <option value="am">Amharic</option>
        <option value="rw">Kinyarwanda</option>
      </select>
      <button class="btn btn-primary" id="submit-btn" onclick="submitJob()">🎤 Extract</button>
    </div>

    <!-- Progress + Activity Log -->
    <div id="progress-wrap" style="display:none">
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" id="progress-bar" style="width:0%"></div></div>
        <div class="progress-label" id="progress-text">Starting...</div>
      </div>
      <div class="log-box" id="activity-log"></div>
    </div>
  </div>
</div>

<!-- ═══ JOBS ═══ -->
<div id="p-jobs" class="panel">
  <div class="card">
    <h3>Recent Jobs</h3>
    <div id="jobs-list"><p style="color:var(--text2);text-align:center">Loading...</p></div>
  </div>
</div>

<!-- ═══ LYRICS VIEWER ═══ -->
<div id="p-viewer" class="panel">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px">
      <div>
        <h3 id="viewer-title" style="margin-bottom:4px">Select a job</h3>
        <div id="viewer-meta" style="font-size:.75rem;color:var(--text2)"></div>
      </div>
      <div style="display:flex;gap:6px">
        <select id="export-select" class="btn btn-outline btn-sm" style="padding:6px 10px">
          <option value="txt">TXT</option><option value="srt">SRT</option><option value="lrc">LRC</option>
          <option value="vtt">VTT</option><option value="json">JSON</option><option value="csv">CSV</option>
        </select>
        <button class="btn btn-outline btn-sm" onclick="exportLyrics()">⬇ Export</button>
      </div>
    </div>
    <input type="text" id="search-input" placeholder="Search lyrics..." oninput="searchLyrics()" style="margin-bottom:12px">
    <div class="lyrics-scroll" id="lyrics-box">
      <p style="color:var(--text2);text-align:center;padding:30px">No lyrics loaded yet</p>
    </div>
  </div>
</div>

<!-- ═══ TRANSLATE ═══ -->
<div id="p-translate" class="panel">
  <div class="card">
    <h3>Translate Lyrics</h3>
    <div class="row">
      <select id="translate-select">
        <option value="en">English</option><option value="fr">French</option><option value="es">Spanish</option>
        <option value="de">German</option><option value="sw">Kiswahili</option><option value="lg">Luganda</option>
        <option value="ar">Arabic</option><option value="zh-CN">Chinese</option><option value="ja">Japanese</option>
      </select>
      <button class="btn btn-primary btn-sm" onclick="translateLyrics()">Translate</button>
    </div>
    <div id="translate-status" style="font-size:.8rem;color:var(--text2);margin:10px 0"></div>
    <div id="translate-output"></div>
  </div>
</div>

<!-- ═══ STATS ═══ -->
<div id="p-stats" class="panel">
  <div class="card">
    <h3>API Statistics</h3>
    <div class="stats-row" id="api-stats"></div>
  </div>
  <div class="card" id="lyrics-stats-wrap" style="display:none">
    <h3>Lyrics Statistics</h3>
    <div class="stats-row" id="lyrics-stats"></div>
  </div>
</div>

</div><!-- /app -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script type="module" src="/static/js/app.js"></script>
</body>
</html>
