<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wulira — Hear every word, in every language</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--border:#2a2a3a;--accent:#6c5ce7;--accent2:#a29bfe;--green:#00b894;--red:#e17055;--yellow:#fdcb6e;--text:#e0e0e0;--text2:#888;--radius:10px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent2);text-decoration:none}
.container{max-width:960px;margin:0 auto;padding:20px}

/* Header */
header{text-align:center;padding:30px 0 20px;border-bottom:1px solid var(--border)}
header h1{font-size:2rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:var(--text2);margin-top:4px;font-size:.9rem}

/* Tabs */
.tabs{display:flex;gap:4px;margin:20px 0;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{padding:10px 20px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;transition:.2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.panel{display:none}
.panel.active{display:block}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card h3{font-size:1rem;margin-bottom:12px;color:var(--accent2)}

/* Form */
.form-row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.form-row input,.form-row select{flex:1;min-width:120px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.9rem}
.form-row input:focus,.form-row select:focus{outline:none;border-color:var(--accent)}
.btn{padding:10px 24px;border:none;border-radius:var(--radius);cursor:pointer;font-size:.9rem;font-weight:600;transition:.2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-sm{padding:6px 14px;font-size:.8rem}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent2)}
.btn-danger{background:var(--red);color:#fff}

/* Status badges */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600}
.badge-queued{background:#2d3436;color:var(--yellow)}
.badge-processing{background:#0c2461;color:#74b9ff}
.badge-done{background:#0a3d2e;color:var(--green)}
.badge-error{background:#3d1010;color:var(--red)}

/* Job list */
.job-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s}
.job-item:hover{background:var(--surface2)}
.job-item:last-child{border-bottom:none}
.job-meta{flex:1;margin:0 16px}
.job-meta .title{font-weight:600;font-size:.9rem}
.job-meta .sub{color:var(--text2);font-size:.8rem;margin-top:2px}

/* Lyrics viewer */
.lyrics-box{max-height:400px;overflow-y:auto;padding:16px;background:var(--surface2);border-radius:var(--radius);font-size:.9rem;line-height:1.8}
.lyrics-box .line{padding:2px 8px;border-radius:4px;transition:.15s}
.lyrics-box .line:hover{background:rgba(108,92,231,.15)}
.lyrics-box .line .ts{color:var(--accent2);font-size:.75rem;margin-right:8px;font-family:monospace}
.lyrics-box .line.chorus{border-left:3px solid var(--accent);padding-left:12px}
.lyrics-box .line.highlight{background:rgba(253,203,110,.15)}

/* Progress bar */
.progress{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin:10px 0}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .3s;border-radius:3px}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.stat{text-align:center;padding:16px;background:var(--surface2);border-radius:var(--radius)}
.stat .val{font-size:1.5rem;font-weight:700;color:var(--accent2)}
.stat .label{font-size:.75rem;color:var(--text2);margin-top:4px}

/* Search */
.search-results .result{padding:10px;border-left:3px solid var(--accent);margin-bottom:8px;background:var(--surface2);border-radius:0 var(--radius) var(--radius) 0}
.search-results .result .ctx{color:var(--text2);font-size:.8rem}

/* Translation */
.translated-line{display:flex;gap:12px;padding:4px 0;border-bottom:1px solid var(--border)}
.translated-line .orig{flex:1;color:var(--text2);font-size:.85rem}
.translated-line .trans{flex:1;font-size:.85rem}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-size:.85rem;z-index:999;animation:slideIn .3s}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Responsive */
@media(max-width:600px){.form-row{flex-direction:column}.tabs{overflow-x:auto}.container{padding:12px}}
</style>
</head>
<body>
<div class="container">

<header>
  <h1>🎵 Wulira</h1>
  <p>Hear every word, in every language · Made in Uganda 🇺🇬</p>
</header>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" data-tab="submit">Submit</div>
  <div class="tab" data-tab="jobs">Jobs</div>
  <div class="tab" data-tab="viewer">Lyrics</div>
  <div class="tab" data-tab="translate">Translate</div>
  <div class="tab" data-tab="stats">Stats</div>
</div>

<!-- Submit Panel -->
<div id="submit" class="panel active">
  <div class="card">
    <h3>🎤 Extract Lyrics</h3>
    <div class="form-row">
      <input type="text" id="url" placeholder="Paste YouTube URL..." autofocus>
    </div>
    <div class="form-row">
      <select id="model">
        <option value="base">base (fast)</option>
        <option value="tiny">tiny (fastest)</option>
        <option value="small">small (better)</option>
        <option value="medium">medium (best for Luganda/Swahili)</option>
        <option value="large">large (most accurate)</option>
      </select>
      <select id="language">
        <option value="">Auto-detect</option>
        <option value="lg">Luganda</option>
        <option value="sw">Kiswahili</option>
        <option value="en">English</option>
        <option value="fr">French</option>
        <option value="ar">Arabic</option>
        <option value="es">Spanish</option>
        <option value="de">German</option>
        <option value="hi">Hindi</option>
        <option value="yo">Yoruba</option>
        <option value="ha">Hausa</option>
        <option value="am">Amharic</option>
        <option value="rw">Kinyarwanda</option>
      </select>
      <button class="btn btn-primary" onclick="submitJob()">Extract</button>
    </div>
    <div id="submit-progress" style="display:none">
      <div class="progress"><div class="progress-bar" id="pbar" style="width:0%"></div></div>
      <p id="pstage" style="font-size:.8rem;color:var(--text2);text-align:center"></p>
    </div>
  </div>

  <div class="card">
    <h3>📦 Batch Submit</h3>
    <div class="form-row">
      <input type="text" id="batch-urls" placeholder="Paste multiple URLs, one per line or comma-separated">
    </div>
    <button class="btn btn-outline btn-sm" onclick="submitBatch()">Submit Batch</button>
  </div>
</div>

<!-- Jobs Panel -->
<div id="jobs" class="panel">
  <div class="card">
    <h3>📋 Recent Jobs</h3>
    <div id="job-list"><p style="color:var(--text2)">Loading...</p></div>
  </div>
</div>

<!-- Lyrics Viewer Panel -->
<div id="viewer" class="panel">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3 id="viewer-title">Select a job to view lyrics</h3>
      <div style="display:flex;gap:6px">
        <select id="export-fmt" class="btn btn-outline btn-sm" style="padding:6px 10px">
          <option value="txt">TXT</option>
          <option value="srt">SRT</option>
          <option value="lrc">LRC</option>
          <option value="vtt">VTT</option>
          <option value="json">JSON</option>
          <option value="csv">CSV</option>
        </select>
        <button class="btn btn-outline btn-sm" onclick="exportLyrics()">⬇ Export</button>
      </div>
    </div>
    <div class="form-row" style="margin-bottom:12px">
      <input type="text" id="search-q" placeholder="Search lyrics..." oninput="searchLyrics()">
    </div>
    <div id="lyrics-content" class="lyrics-box">
      <p style="color:var(--text2)">No lyrics loaded</p>
    </div>
    <div id="search-results" class="search-results" style="margin-top:12px"></div>
  </div>
  <div class="card" id="viewer-info" style="display:none">
    <h3>ℹ️ Info</h3>
    <div id="viewer-meta"></div>
  </div>
</div>

<!-- Translate Panel -->
<div id="translate" class="panel">
  <div class="card">
    <h3>🌍 Translate Lyrics</h3>
    <div class="form-row">
      <select id="translate-to">
        <option value="en">English</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
        <option value="de">German</option>
        <option value="ar">Arabic</option>
        <option value="sw">Kiswahili</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
      </select>
      <button class="btn btn-primary btn-sm" onclick="translateLyrics()">Translate</button>
    </div>
    <div id="translate-status" style="margin:10px 0;font-size:.85rem;color:var(--text2)"></div>
    <div id="translate-output"></div>
  </div>
</div>

<!-- Stats Panel -->
<div id="stats" class="panel">
  <div class="card">
    <h3>📊 API Statistics</h3>
    <div id="api-stats" class="stats-grid"></div>
  </div>
  <div class="card" id="lyrics-stats-card" style="display:none">
    <h3>🎵 Lyrics Statistics</h3>
    <div id="lyrics-stats" class="stats-grid"></div>
  </div>
</div>

</div><!-- /container -->

<script>
const API = window.location.origin;
let currentJobId = null;
let currentJob = null;
let ws = null;

// Tab switching
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.tab).classList.add('active');
    if (t.dataset.tab === 'jobs') loadJobs();
    if (t.dataset.tab === 'stats') loadStats();
  });
});

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function badge(status) {
  return `<span class="badge badge-${status}">${status}</span>`;
}

// Submit job
async function submitJob() {
  const url = document.getElementById('url').value.trim();
  if (!url) return toast('Paste a YouTube URL');
  const body = {
    url,
    model: document.getElementById('model').value,
    language: document.getElementById('language').value || null,
  };
  try {
    const res = await fetch(`${API}/api/transcribe`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) return toast(data.detail || 'Error');
    toast(`Job queued: ${data.job_id.slice(0,8)}...`);
    currentJobId = data.job_id;
    connectWS(data.job_id);
    document.getElementById('submit-progress').style.display = 'block';
  } catch (e) { toast('Network error'); }
}

// Batch submit
async function submitBatch() {
  const raw = document.getElementById('batch-urls').value.trim();
  if (!raw) return toast('Paste URLs');
  const urls = raw.split(/[\n,]+/).map(u => u.trim()).filter(Boolean);
  try {
    const res = await fetch(`${API}/api/batch-transcribe`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ urls, model: document.getElementById('model').value }),
    });
    const data = await res.json();
    if (!res.ok) return toast(data.detail || 'Error');
    toast(`Batch queued: ${data.count} jobs`);
  } catch (e) { toast('Network error'); }
}

// WebSocket live progress
function connectWS(jobId) {
  if (ws) ws.close();
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/job/${jobId}`);
  ws.onmessage = (e) => {
    const d = JSON.parse(e.data);
    const pbar = document.getElementById('pbar');
    const pstage = document.getElementById('pstage');
    const stages = {queued:'Queued...',downloading:'Downloading audio...',detecting_language:'Detecting language...',transcribing:'Extracting lyrics...',done:'✓ Complete!'};
    pstage.textContent = stages[d.stage] || d.stage;
    pbar.style.width = (d.progress || 0) + '%';
    if (d.stage === 'done') {
      setTimeout(() => {
        loadJob(jobId);
        document.querySelector('[data-tab="viewer"]').click();
      }, 500);
    }
  };
  ws.onerror = () => {};
}

// Load jobs list
async function loadJobs() {
  try {
    const res = await fetch(`${API}/api/jobs`);
    if (!res.ok) { document.getElementById('job-list').innerHTML = '<p style="color:var(--text2)">No jobs yet</p>'; return; }
    const data = await res.json();
    const list = data.jobs || [];
    if (!list.length) { document.getElementById('job-list').innerHTML = '<p style="color:var(--text2)">No jobs yet</p>'; return; }
    document.getElementById('job-list').innerHTML = list.map(j => `
      <div class="job-item" onclick="loadJob('${j.job_id}'); document.querySelector('[data-tab=viewer]').click();">
        <div>${badge(j.status)}</div>
        <div class="job-meta">
          <div class="title">${j.title || j.job_id.slice(0,12)}</div>
          <div class="sub">${j.language_detected || ''} · ${j.lyrics_source || ''} · ${j.created_at ? new Date(j.created_at).toLocaleString() : ''}</div>
        </div>
        <button class="btn btn-outline btn-sm" onclick="event.stopPropagation(); deleteJob('${j.job_id}')">✕</button>
      </div>
    `).join('');
  } catch { document.getElementById('job-list').innerHTML = '<p style="color:var(--text2)">Could not load jobs</p>'; }
}

// Load single job into viewer
async function loadJob(jobId) {
  try {
    const res = await fetch(`${API}/api/job/${jobId}`);
    if (!res.ok) return toast('Job not found');
    currentJob = await res.json();
    currentJobId = jobId;
    renderLyrics(currentJob);
    loadLyricsStats(jobId);
  } catch { toast('Error loading job'); }
}

// Render lyrics
function renderLyrics(job) {
  document.getElementById('viewer-title').textContent = job.title || 'Untitled';
  const segs = job.transcript || [];
  if (!segs.length) {
    document.getElementById('lyrics-content').innerHTML = '<p style="color:var(--text2)">No lyrics found</p>';
    return;
  }
  document.getElementById('lyrics-content').innerHTML = segs.map((s, i) => {
    const ts = s.start != null ? `<span class="ts">${fmtTime(s.start)}</span>` : '';
    return `<div class="line" data-idx="${i}">${ts}${escHtml(s.text)}</div>`;
  }).join('');

  // Show info
  document.getElementById('viewer-info').style.display = 'block';
  document.getElementById('viewer-meta').innerHTML = `
    <p><b>Artist:</b> ${escHtml(job.uploader || '?')}</p>
    <p><b>Language:</b> ${escHtml(job.language_detected || '?')} (${job.language_confidence || 0}%)</p>
    <p><b>Source:</b> ${escHtml(job.lyrics_source || 'whisper')}</p>
    <p><b>Duration:</b> ${fmtTime(job.duration || 0)}</p>
    <p><b>Segments:</b> ${segs.length}</p>
  `;
}

// Search lyrics
let searchTimer;
function searchLyrics() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    const q = document.getElementById('search-q').value.trim();
    const box = document.getElementById('search-results');
    if (!q || q.length < 2 || !currentJobId) { box.innerHTML = ''; highlightClear(); return; }
    try {
      const res = await fetch(`${API}/api/job/${currentJobId}/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      highlightClear();
      if (!data.results?.length) { box.innerHTML = '<p style="color:var(--text2)">No matches</p>'; return; }
      box.innerHTML = data.results.map(r => `
        <div class="result">
          <div class="ctx">${escHtml(r.context_before)}</div>
          <div><b>${escHtml(r.text)}</b></div>
          <div class="ctx">${escHtml(r.context_after)}</div>
        </div>
      `).join('');
      data.results.forEach(r => {
        const el = document.querySelector(`.line[data-idx="${r.index}"]`);
        if (el) el.classList.add('highlight');
      });
    } catch {}
  }, 300);
}
function highlightClear() { document.querySelectorAll('.line.highlight').forEach(e => e.classList.remove('highlight')); }

// Export
async function exportLyrics() {
  if (!currentJobId) return toast('No job selected');
  const fmt = document.getElementById('export-fmt').value;
  try {
    const res = await fetch(`${API}/api/job/${currentJobId}/export/${fmt}`);
    if (!res.ok) return toast('Export failed');
    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `wulira-lyrics.${fmt}`;
    a.click();
    toast(`Exported as ${fmt.toUpperCase()}`);
  } catch { toast('Export error'); }
}

// Delete job
async function deleteJob(jobId) {
  try {
    await fetch(`${API}/api/job/${jobId}`, { method: 'DELETE' });
    toast('Job deleted');
    loadJobs();
  } catch { toast('Delete failed'); }
}

// Translate
async function translateLyrics() {
  if (!currentJobId || !currentJob) return toast('Load a job first');
  const to = document.getElementById('translate-to').value;
  const from = currentJob.language_code || 'en';
  document.getElementById('translate-status').textContent = 'Translating...';
  try {
    const res = await fetch(`${API}/api/job/${currentJobId}/translate`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ from_code: from, to_code: to }),
    });
    const data = await res.json();
    if (!res.ok) {
      document.getElementById('translate-status').textContent = data.detail || 'Translation failed';
      return;
    }
    document.getElementById('translate-status').textContent = `Translated ${from} → ${to}`;
    const segs = data.translated || [];
    document.getElementById('translate-output').innerHTML = segs.map(s => `
      <div class="translated-line">
        <div class="orig">${escHtml(s.original_text || '')}</div>
        <div class="trans">${escHtml(s.text || '')}</div>
      </div>
    `).join('');
  } catch { document.getElementById('translate-status').textContent = 'Translation error'; }
}

// Stats
async function loadStats() {
  try {
    const res = await fetch(`${API}/api/stats`);
    const d = await res.json();
    document.getElementById('api-stats').innerHTML = `
      <div class="stat"><div class="val">${d.total_jobs||0}</div><div class="label">Total Jobs</div></div>
      <div class="stat"><div class="val">${d.processing||0}</div><div class="label">Processing</div></div>
      <div class="stat"><div class="val">${d.done||0}</div><div class="label">Completed</div></div>
      <div class="stat"><div class="val">${d.errors||0}</div><div class="label">Errors</div></div>
      <div class="stat"><div class="val">${(d.models_cached||[]).length}</div><div class="label">Models Cached</div></div>
      <div class="stat"><div class="val">${d.environment||'?'}</div><div class="label">Environment</div></div>
    `;
  } catch {}
}

async function loadLyricsStats(jobId) {
  try {
    const res = await fetch(`${API}/api/job/${jobId}/lyrics-stats`);
    if (!res.ok) return;
    const d = await res.json();
    const s = d.statistics || {};
    document.getElementById('lyrics-stats-card').style.display = 'block';
    document.getElementById('lyrics-stats').innerHTML = `
      <div class="stat"><div class="val">${s.total_words||0}</div><div class="label">Words</div></div>
      <div class="stat"><div class="val">${s.unique_words||0}</div><div class="label">Unique</div></div>
      <div class="stat"><div class="val">${s.words_per_minute||0}</div><div class="label">WPM</div></div>
      <div class="stat"><div class="val">${s.vocabulary_richness||0}</div><div class="label">Richness</div></div>
      <div class="stat"><div class="val">${s.chorus_percentage||0}%</div><div class="label">Chorus</div></div>
      <div class="stat"><div class="val">${s.total_segments||0}</div><div class="label">Segments</div></div>
    `;
  } catch {}
}

// Helpers
function fmtTime(sec) { const m=Math.floor(sec/60),s=Math.floor(sec%60); return `${m}:${String(s).padStart(2,'0')}`; }
function escHtml(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

// Init
loadJobs();
</script>
</body>
</html>
